name: Sync Meta Ads Data

on:
  push:
    branches: [main]
    paths: ['worker.js', 'wrangler.toml', '.github/workflows/**']
  schedule:
    - cron: '0 */3 * * *'  # cada 3 horas
  workflow_dispatch: {}     # trigger manual

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare deploy
        run: |
          curl -s -X POST "${{ secrets.CF_DEPLOY_HOOK }}" || true
      - name: Wait for deploy
        run: sleep 30

  manage:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Pause Red 9 Abril adset
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"adset_id":"120242951595680335","status":"PAUSED"}' \
            "${{ secrets.WORKER_URL }}/adset/update")
          echo "Pause response: $RESPONSE"
          echo "$RESPONSE" | jq .

  sync:
    needs: [deploy, manage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all accounts summary
        run: |
          mkdir -p data
          curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
            "${{ secrets.WORKER_URL }}/accounts?date_preset=last_7d" \
            -o data/accounts.json

      - name: Fetch campaigns per account
        run: |
          ACCOUNTS=$(cat data/accounts.json | jq -r '.accounts[] | select(.spend > 0) | .id')
          echo '{}' > data/campaigns_all.json
          for acct in $ACCOUNTS; do
            echo "Fetching campaigns for $acct..."
            curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
              "${{ secrets.WORKER_URL }}/campaigns?account_id=${acct}&date_preset=last_7d&level=adset" \
              -o "data/campaigns_${acct}.json"
          done

      - name: Fetch daily breakdown per account
        run: |
          ACCOUNTS=$(cat data/accounts.json | jq -r '.accounts[] | select(.spend > 0) | .id')
          for acct in $ACCOUNTS; do
            echo "Fetching daily for $acct..."
            curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
              "${{ secrets.WORKER_URL }}/daily?account_id=${acct}&date_preset=last_7d&level=adset" \
              -o "data/daily_${acct}.json"
          done

      - name: Fetch today snapshot per account
        run: |
          ACCOUNTS=$(cat data/accounts.json | jq -r '.accounts[] | select(.spend > 0) | .id')
          for acct in $ACCOUNTS; do
            echo "Fetching today for $acct..."
            curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
              "${{ secrets.WORKER_URL }}/campaigns?account_id=${acct}&date_preset=today&level=adset" \
              -o "data/today_${acct}.json"
          done

      - name: Add timestamp
        run: |
          echo "{\"last_updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "Update Meta Ads data $(date -u +%Y-%m-%d_%H:%M)" && git push)
