name: Sync Meta Ads Data

on:
  push:
    branches: [main]
    paths: ['worker.js', 'wrangler.toml', '.github/workflows/**']
  schedule:
    - cron: '0 */3 * * *'  # cada 3 horas
  workflow_dispatch: {}     # trigger manual

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare deploy
        run: |
          curl -s -X POST "${{ secrets.CF_DEPLOY_HOOK }}" || true
      - name: Wait for deploy
        run: sleep 30

  manage:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Pause Red 9 Abril adset
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"adset_id":"120242951595680335","status":"PAUSED"}' \
            "${{ secrets.WORKER_URL }}/adset/update")
          echo "Pause response: $RESPONSE"
          echo "$RESPONSE" | jq .

      - name: Get current budgets
        run: |
          echo "=== 22 marzo (winner) ==="
          WINNER=$(curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
            "${{ secrets.WORKER_URL }}/adset?adset_id=120241959986730335")
          echo "$WINNER" | jq .
          WINNER_BUDGET=$(echo "$WINNER" | jq -r '.daily_budget_cents // 0')
          echo "Current budget cents: $WINNER_BUDGET"

          echo "=== 9 Abril ==="
          SECOND=$(curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
            "${{ secrets.WORKER_URL }}/adset?adset_id=120242948265790335")
          echo "$SECOND" | jq .
          SECOND_BUDGET=$(echo "$SECOND" | jq -r '.daily_budget_cents // 0')
          echo "Current budget cents: $SECOND_BUDGET"

          echo "WINNER_BUDGET=$WINNER_BUDGET" >> $GITHUB_ENV
          echo "SECOND_BUDGET=$SECOND_BUDGET" >> $GITHUB_ENV

      - name: Redistribute budget to 22 marzo
        run: |
          # Add $7/day (700 cents) to winner, $3/day (300 cents) to second
          NEW_WINNER=$(( $WINNER_BUDGET + 700 ))
          NEW_SECOND=$(( $SECOND_BUDGET + 300 ))

          echo "Increasing 22 marzo: $WINNER_BUDGET -> $NEW_WINNER cents"
          curl -s -X POST \
            -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"adset_id\":\"120241959986730335\",\"daily_budget\":\"$NEW_WINNER\"}" \
            "${{ secrets.WORKER_URL }}/adset/update" | jq .

          echo "Increasing 9 Abril: $SECOND_BUDGET -> $NEW_SECOND cents"
          curl -s -X POST \
            -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"adset_id\":\"120242948265790335\",\"daily_budget\":\"$NEW_SECOND\"}" \
            "${{ secrets.WORKER_URL }}/adset/update" | jq .

  sync:
    needs: [deploy, manage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all accounts summary
        run: |
          mkdir -p data
          curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
            "${{ secrets.WORKER_URL }}/accounts?date_preset=last_7d" \
            -o data/accounts.json

      - name: Fetch campaigns per account
        run: |
          ACCOUNTS=$(cat data/accounts.json | jq -r '.accounts[] | select(.spend > 0) | .id')
          echo '{}' > data/campaigns_all.json
          for acct in $ACCOUNTS; do
            echo "Fetching campaigns for $acct..."
            curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
              "${{ secrets.WORKER_URL }}/campaigns?account_id=${acct}&date_preset=last_7d&level=adset" \
              -o "data/campaigns_${acct}.json"
          done

      - name: Fetch daily breakdown per account
        run: |
          ACCOUNTS=$(cat data/accounts.json | jq -r '.accounts[] | select(.spend > 0) | .id')
          for acct in $ACCOUNTS; do
            echo "Fetching daily for $acct..."
            curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
              "${{ secrets.WORKER_URL }}/daily?account_id=${acct}&date_preset=last_7d&level=adset" \
              -o "data/daily_${acct}.json"
          done

      - name: Fetch today snapshot per account
        run: |
          ACCOUNTS=$(cat data/accounts.json | jq -r '.accounts[] | select(.spend > 0) | .id')
          for acct in $ACCOUNTS; do
            echo "Fetching today for $acct..."
            curl -s -H "x-api-secret: ${{ secrets.META_API_SECRET }}" \
              "${{ secrets.WORKER_URL }}/campaigns?account_id=${acct}&date_preset=today&level=adset" \
              -o "data/today_${acct}.json"
          done

      - name: Add timestamp
        run: |
          echo "{\"last_updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "Update Meta Ads data $(date -u +%Y-%m-%d_%H:%M)" && git push)
